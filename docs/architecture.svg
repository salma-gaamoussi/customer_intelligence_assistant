<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="560" fill="#ffffff"/>

  <!-- User -->
  <rect x="430" y="20" width="140" height="50" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="500" y="50" text-anchor="middle" font-size="15" fill="#1e293b">User (retention agent)</text>

  <line x1="500" y1="70" x2="500" y2="108" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FastAPI / guardrail -->
  <rect x="330" y="110" width="340" height="66" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="500" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">FastAPI  /ask</text>
  <text x="500" y="158" text-anchor="middle" font-size="12" fill="#475569">input guardrail — length &amp; prompt-injection check</text>

  <line x1="500" y1="176" x2="500" y2="214" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Router -->
  <rect x="300" y="216" width="400" height="66" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="500" y="242" text-anchor="middle" font-size="15" font-weight="600" fill="#312e81">LLM Router  (gpt-4o-mini)</text>
  <text x="500" y="264" text-anchor="middle" font-size="12" fill="#4338ca">structured output: route · confidence · reasoning</text>

  <!-- fork -->
  <line x1="500" y1="282" x2="500" y2="304" stroke="#475569" stroke-width="1.5"/>
  <line x1="170" y1="304" x2="830" y2="304" stroke="#475569" stroke-width="1.5"/>
  <line x1="170" y1="304" x2="170" y2="336" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="304" x2="500" y2="336" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="830" y1="304" x2="830" y2="336" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- low-confidence clarify branch, off to the side -->
  <text x="560" y="298" font-size="11" fill="#94a3b8" font-style="italic">(low confidence → "clarify" response, no branch taken)</text>

  <!-- sql branch -->
  <rect x="70" y="338" width="200" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="170" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">route = sql</text>
  <text x="170" y="382" text-anchor="middle" font-size="12" fill="#1e40af">LangChain SQL agent</text>

  <!-- docs branch -->
  <rect x="400" y="338" width="200" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="500" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">route = docs</text>
  <text x="500" y="382" text-anchor="middle" font-size="12" fill="#166534">RAG chain</text>

  <!-- out of scope branch -->
  <rect x="730" y="338" width="200" height="64" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="830" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">route = out_of_scope</text>
  <text x="830" y="382" text-anchor="middle" font-size="12" fill="#475569">polite refusal</text>

  <!-- arrows down to storage -->
  <line x1="170" y1="402" x2="170" y2="430" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="402" x2="500" y2="430" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- postgres telco -->
  <rect x="60" y="432" width="220" height="60" rx="8" fill="#f8fafc" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="170" y="456" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">PostgreSQL · telco</text>
  <text x="170" y="475" text-anchor="middle" font-size="11" fill="#475569">read-only role</text>

  <!-- pgvector rag -->
  <rect x="390" y="432" width="220" height="60" rx="8" fill="#f8fafc" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="500" y="456" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">pgvector · rag</text>
  <text x="500" y="475" text-anchor="middle" font-size="11" fill="#475569">cited source chunks</text>

  <!-- shared postgres note -->
  <text x="500" y="520" text-anchor="middle" font-size="12" fill="#94a3b8">one PostgreSQL 16 instance, two schemas</text>

  <!-- log note -->
  <text x="830" y="440" text-anchor="middle" font-size="11" fill="#94a3b8">(every request, incl. this one,</text>
  <text x="830" y="455" text-anchor="middle" font-size="11" fill="#94a3b8">logged to logs/requests.jsonl)</text>
</svg>
